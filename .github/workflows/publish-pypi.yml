name: Publish to PyPI

on:
  push:
    branches: [main]
    tags:
      - v*
  workflow_dispatch:

env:
  # PyPI API token for trusted publishing
  PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

jobs:
  build-and-publish:
    name: Build and Publish to PyPI
    runs: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip build setuptools wheel setuptools_scm[toml] cibuildwheel>=2.16.0

      - name: Build wheels (cibuildwheel)
        run: |
          pip install cibuildwheel>=2.16.0
          python -m cibuildwheel --platform linux_x86_64 --outdir dist

      - name: Build source distribution (sdist)
        run: |
          python -m build --sdist --outdir dist

      - name: Check for existing package on PyPI
        id: check_pypi
        run: |
          pip index versions ti-docs-mcp || echo "Package not found on PyPI"

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
          TWINE_REPOSITORY_CONFIG: >
            username: __token__
            password: ${{ secrets.PYPI_API_TOKEN }}
            disable_spinner: 1
        run: |
          pip install --upgrade twine
          twine upload --skip-existing dist/*
