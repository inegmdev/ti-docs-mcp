name: Publish to PyPI

on:
  push:
    branches: [main]
  tags:
    - v*
  workflow_dispatch:

env:
  PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

jobs:
  publish:
    name: Publish to PyPI
    runs: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          pip install --upgrade pip build setuptools wheel setuptools_scm[toml] cibuildwheel>=2.16.0

      - name: Build sdist
        run: |
          python -m build --sdist --outdir dist

      - name: Build wheels (cibuildwheel)
        run: |
          pip install cibuildwheel>=2.16.0
          python -m cibuildwheel --platform linux_x86_64 --outdir dist

      - name: Upload wheels to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install --upgrade twine
          twine upload --skip-existing dist/*whl --verbose

      - name: Upload sdist to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install --upgrade twine
          twine upload --skip-existing dist/ti-docs-mcp-*.tar.gz --verbose
