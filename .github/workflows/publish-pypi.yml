name: Build and Publish to PyPI

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # PyPI API token (stored in GitHub Secrets as PYPI_API_TOKEN)
  PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
  # Build configuration
  CIBW_BUILD: "cp313-manylinux_*"
  CIBW_ARCHS_LINUX: "x86_64"
  CIBW_ARCHS_LINUX_X86_64: "x86_64"
  CIBW_ARCHS_LINUX_X86_64_V3: "x86_64"
  CIBW_MANYLINUX_X86_64: "x86_64"
  CIBW_ARCHS_LINUX_X86_64_V3: "x86_64"
  # Disable manylinux2014 (too old for modern wheels)
  CIBW_MANYLINUX_PYPYTHON: "cp38"

jobs:
  build:
    name: Build wheels
    runs: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
        cibw-python: ["cp38"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build setuptools wheel

      - name: Build source distribution (sdist)
        run: |
          python -m build --sdist --outdir dist/

      - name: Build wheels (cibuildwheel)
        run: |
          python -m pip install cibuildwheel>=2.16.0
          python -m cibuildwheel --platform ${{ matrix.cibw-python }} ${{ matrix.os }} --outdir dist/

      - name: Upload wheels to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install --upgrade twine
          twine upload --skip-existing dist/*whl --verbose

  build_sdist:
    name: Build source distribution
    runs: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build setuptools wheel

      - name: Build source distribution (sdist)
        run: |
          python -m build --sdist --outdir dist/

      - name: Upload sdist to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install --upgrade twine
          twine upload --skip-existing dist/ti-docs-mcp-*.tar.gz --verbose

  # Only publish from main branch
  check-main-branch:
    name: Check main branch
    runs: ubuntu-latest
    steps:
      - name: Check if main branch
        id: check
        if: github.ref != 'refs/heads/main'
          run: echo "::error::Not on main branch"
          run: exit 1

  # Check if already released
  check-tag:
    name: Check existing tag
    runs: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
    steps:
      - name: Get latest tag
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            latest_tag=$(git tag -l "v*" | sort -V | tail -1)
            echo "latest_tag=${latest_tag}"
            if [ -n "${latest_tag}" ]; then
              echo "should_publish=true"
            else
              echo "should_publish=false"

      - name: Check if new tag
        id: check
        run: |
          if [ "${latest_tag}" == "${{ github.ref_name }}" ]; then
              echo "should_publish=true"
          else
              echo "should_publish=false"

      - name: Determine if should publish
        id: check
        if: steps.check.outputs.should_publish != 'true' || steps.check-tag.outputs.should_publish != 'true'
          run: echo "should_publish=false"

  # Create GitHub Release (only when publishing)
  create-release:
    name: Create GitHub Release
    needs: [build]
    runs: ubuntu-latest
    if: needs.check-check.outputs.should_publish == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          target: main
          generate_release_notes: true
          body: |
            ${{ github.event.head_commit.message }}

          token: ${{ secrets.GITHUB_TOKEN }}
